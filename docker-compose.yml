services:
  audio-converter-api:
    build: .
    container_name: audio-converter-api
    restart: unless-stopped
    ports:
      - "3009:3009"
    environment:
      PORT: 3009
      MAX_BYTES: 26214400
      BITRATE: 128k
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
